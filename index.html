<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
    <meta name="description" content="Docsify Ciphertext">
    <title>Docsify Ciphertext</title>

    <!-- Docsify 5 — core theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@^5.0.0-rc/dist/themes/core.min.css">
    <!-- Docsify 5 — dark mode add-on (activated only when OS is dark) -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/docsify@^5.0.0-rc/dist/themes/addons/core-dark.min.css"
        media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="https://gllmar.github.io/docsify-lightbox-v5/docsify-lightbox.css">

    <style>
        :root {
            --theme-color: #1a73e8;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <!-- 1. Docsify configuration -->
    <script>
        window.$docsify = {
            name:        'Docsify Ciphertext',
            repo:        'https://github.com/gllmAR/docsify-ciphertext',
            auto2top:    true,
            loadSidebar: false,
            subMaxLevel: 4,
            copyCode: {
                buttonText:  '📄',
                errorText:   '⚠️',
                successText: '✅ ',
            },
        };
    </script>

    <!-- 2. Single-line import — auto-registers, no plugins[] entry needed -->
    <script src="docsify-ciphertext.js"></script>

    <!-- 3. Docsify 5 core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@^5.0.0-rc/dist/docsify.min.js"></script>

    <!-- Prism language components (markup must precede markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>

    <!-- Mermaid -->
    <script type="module">
        import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
        mermaid.initialize({ startOnLoad: true, theme: "neutral" });
        window.mermaid = mermaid;
    </script>
    <script src="//unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>

    <!-- Lightbox v5 — regular script, auto-registers as Docsify plugin -->
    <script src="https://gllmar.github.io/docsify-lightbox-v5/docsify-lightbox.js"></script>

    <!-- Other plugins -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="https://gllmar.github.io/docsify-repo-toolbar/docsify-repo-toolbar.js"></script>
    <script src="https://gllmar.github.io/docsify-unhashtaglink/docsify-unhashtaglink.js"></script>
    <script src="https://gllmar.github.io/docsify-alert/docsify-alerts.js"></script>

</body>

</html>
